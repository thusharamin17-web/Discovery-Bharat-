<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="common.css">
</head>
<body>

<div class="back-link-wrap"><a href="main.html" class="back-link">← Back to Map</a></div>
<!-- MAIN SECTION -->
<main class="main-container">

    <section class="map-section">
        <img src="videos/union-territory.jpg" alt="Map of India showing Union Territories">

    <section class="right-section">

        <!-- SIDEBAR -->
        <aside class="sidebar">

        <section class="content-area" id="display-panel">

            <!-- BACK BUTTON -->
            <button id="backBtn" class="back-btn">⬅ Back</button>

        </section>

<!-- FOOTER -->
<footer>
